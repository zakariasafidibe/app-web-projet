version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo "Installation des outils..."
      - npm install
      - npm install -g minify
  pre_build:
    commands:
      - echo "Lancement des tests..."
      - npm test
  build:
    commands:
      - echo "Minification..."
      - minify index.html > index.min.html
      - mv index.min.html index.html
  post_build:
    commands:
      - echo "Build OK !"

artifacts:
  files:
    - index.html
    - package.json
    - server.js
